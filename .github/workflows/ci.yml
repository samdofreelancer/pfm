name: CI Pipeline

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  # ------------------------------------------------
  # 1. Build: compile, test, package Docker images
  # ------------------------------------------------
  build:
    name: Build & Test
    uses: ./.github/workflows/reusable-build.yml
    with:
      java-version: '17'
      node-version: '20'
      build-backend: true
      build-frontend: true
      build-docker: true
      upload-test-results: true
      upload-docker-images: true

  # ------------------------------------------------
  # 2. E2E Tests: run Playwright against Docker stack
  # ------------------------------------------------
  e2e-tests:
    name: E2E Tests
    uses: ./.github/workflows/reusable-e2e.yml
    needs: [build]
    if: success()
    with:
      docker-artifact-name: ${{ needs.build.outputs.docker-artifact-name }}
      e2e-service-name: e2e