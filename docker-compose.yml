version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: pfm-postgres
    environment:
      POSTGRES_DB: pfm
      POSTGRES_USER: pfm_user
      POSTGRES_PASSWORD: pfm_password
      TZ: Asia/Ho_Chi_Minh
      PGTZ: Asia/Ho_Chi_Minh
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pfm_user -d pfm"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: pfm-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: pfm_backend
    container_name: pfm-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JAVA_TOOL_OPTIONS=-Duser.timezone=Asia/Ho_Chi_Minh
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: pfm_frontend
    container_name: pfm-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  e2e:
    build:
      context: ./e2e
      dockerfile: Dockerfile
    image: pfm_e2e
    container_name: pfm-e2e
    environment:
      - CI=1
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    command: npm test
    restart: "no"
    # Only start e2e when explicitly requested (e.g., in CI)
    profiles:
      - e2e
    # Mount volumes for test results and reports
    volumes:
      - ./e2e/test-results:/app/test-results
      - ./e2e/playwright-report:/app/playwright-report

volumes:
  pgdata: